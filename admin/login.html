<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>SpiderWeb Admin — Login</title>
	<style>
		@font-face {
			font-family: "GothamBlackItalic";
			src: url(../assets/font/GOTHAM-BLACKITALIC.TTF) format("truetype");
			font-weight: normal;
			font-style: normal;
		}

		*,
		*::before,
		*::after {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		:root {
			--bg-dark: #0a0a0f;
			--bg-glass: rgba(255, 255, 255, 0.06);
			--border-glass: rgba(255, 255, 255, 0.08);
			--accent: #e63946;
			--accent-glow: rgba(230, 57, 70, 0.35);
			--gradient-accent: linear-gradient(135deg, #e63946, #ff6b6b);
			--text-primary: #f1f1f1;
			--text-secondary: #999;
			--radius-md: 16px;
			--radius-sm: 8px;
			--transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
		}

		html,
		body {
			height: 100%;
		}

		body {
			font-family: "Inter", sans-serif;
			background-color: var(--bg-dark);
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			overflow: hidden;
			color: var(--text-primary);
		}

		/* Glow orb background */
		body::before {
			content: "";
			position: fixed;
			width: 500px;
			height: 500px;
			border-radius: 50%;
			background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			filter: blur(80px);
			pointer-events: none;
			animation: pulse 6s ease-in-out infinite;
		}

		/* Grain overlay */
		body::after {
			content: "";
			position: fixed;
			inset: 0;
			pointer-events: none;
			opacity: 0.025;
			background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
			background-repeat: repeat;
			background-size: 256px 256px;
		}

		@keyframes pulse {

			0%,
			100% {
				opacity: 0.4;
				transform: translate(-50%, -50%) scale(1);
			}

			50% {
				opacity: 0.7;
				transform: translate(-50%, -50%) scale(1.15);
			}
		}

		/* Card */
		.login-card {
			position: relative;
			z-index: 1;
			background: var(--bg-glass);
			border: 1px solid var(--border-glass);
			backdrop-filter: blur(20px);
			-webkit-backdrop-filter: blur(20px);
			border-radius: var(--radius-md);
			padding: 48px 40px 40px;
			width: 360px;
			animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
		}

		@keyframes cardIn {
			from {
				opacity: 0;
				transform: translateY(24px) scale(0.97);
			}

			to {
				opacity: 1;
				transform: translateY(0) scale(1);
			}
		}

		/* Logo / header */
		.login-header {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 12px;
			margin-bottom: 36px;
		}

		.login-header img {
			width: 52px;
			height: 52px;
			filter: brightness(0) invert(1);
		}

		.login-header h1 {
			font-family: "GothamBlackItalic";
			font-size: 1.6rem;
			background: var(--gradient-accent);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
		}

		.login-header p {
			font-size: 0.8rem;
			color: var(--text-secondary);
			text-transform: uppercase;
			letter-spacing: 2px;
		}

		/* Error */
		.error {
			display: none;
			background: rgba(230, 57, 70, 0.1);
			border: 1px solid rgba(230, 57, 70, 0.3);
			color: #ff6b6b;
			font-size: 0.85rem;
			text-align: center;
			padding: 10px 14px;
			border-radius: var(--radius-sm);
			margin-bottom: 20px;
		}

		/* Fields */
		.field {
			margin-bottom: 16px;
		}

		.field label {
			display: block;
			font-size: 0.75rem;
			color: var(--text-secondary);
			text-transform: uppercase;
			letter-spacing: 1.2px;
			margin-bottom: 6px;
		}

		.field input {
			width: 100%;
			padding: 12px 16px;
			background: rgba(255, 255, 255, 0.04);
			border: 1px solid var(--border-glass);
			border-radius: var(--radius-sm);
			color: var(--text-primary);
			font-size: 0.95rem;
			font-family: inherit;
			outline: none;
			transition: border-color var(--transition), box-shadow var(--transition);
		}

		.field input::placeholder {
			color: rgba(255, 255, 255, 0.2);
		}

		.field input:focus {
			border-color: var(--accent);
			box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.15);
		}

		/* Submit button */
		.btn-submit {
			width: 100%;
			padding: 13px;
			margin-top: 8px;
			background: var(--gradient-accent);
			color: #fff;
			border: none;
			border-radius: var(--radius-sm);
			cursor: pointer;
			font-size: 0.95rem;
			font-weight: 700;
			font-family: "GothamBlackItalic";
			letter-spacing: 1px;
			transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
		}

		.btn-submit:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 25px var(--accent-glow);
		}

		.btn-submit:active {
			transform: translateY(0);
		}

		.btn-submit:disabled {
			opacity: 0.6;
			cursor: not-allowed;
			transform: none;
			box-shadow: none;
		}

		/* Footer */
		.login-footer {
			text-align: center;
			margin-top: 24px;
			font-size: 0.75rem;
			color: rgba(255, 255, 255, 0.15);
		}
	</style>
</head>

<body>

	<div class="login-card">
		<div class="login-header">
			<img src="../assets/img/logo.svg" alt="SpiderWeb Logo" onerror="this.style.display='none'" />
			<h1>SpiderWeb</h1>
			<p>Panel de administración</p>
		</div>

		<div id="errorMsg" class="error">Credenciales inválidas</div>

		<form id="loginForm">
			<div class="field">
				<label for="username">Usuario</label>
				<input type="text" id="username" placeholder="tu usuario" autocomplete="username" required />
			</div>
			<div class="field">
				<label for="password">Contraseña</label>
				<input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
			</div>
			<button type="submit" class="btn-submit" id="submitBtn">Ingresar</button>
		</form>

		<p class="login-footer">SpiderWeb &copy; 2025</p>
	</div>

	<script>
		document.getElementById("loginForm").addEventListener("submit", async (e) => {
			e.preventDefault();

			const username = document.getElementById("username").value;
			const password = document.getElementById("password").value;
			const errorMsg = document.getElementById("errorMsg");
			const submitBtn = document.getElementById("submitBtn");

			errorMsg.style.display = "none";
			submitBtn.disabled = true;
			submitBtn.textContent = "Verificando...";

			try {
				const res = await fetch("/login", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ username, password }),
				});

				if (res.ok) {
					submitBtn.textContent = "Acceso concedido ✓";
					setTimeout(() => window.location.href = "/admin", 400);
				} else {
					errorMsg.style.display = "block";
					submitBtn.disabled = false;
					submitBtn.textContent = "Ingresar";
				}
			} catch (err) {
				console.error(err);
				errorMsg.innerText = "Error de conexión";
				errorMsg.style.display = "block";
				submitBtn.disabled = false;
				submitBtn.textContent = "Ingresar";
			}
		});
	</script>
</body>

</html>
